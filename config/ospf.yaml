# =========================
# OSPF操作实验
# =========================


# 脚本信息主要包含两部分，一是设备信息，二是链路信息
# devices:
#   - id: core-1      # 设备ID，唯一标识
#     name: 路由器1    # 设备名称
#     role: core      # 设备角色，core、aggregation、access、terminal
#     device_type: router       # 设备类型，router、switch、pc
#     ip: 202.16.1.1      # 设备IP地址
#     netmask: 255.255.255.255       # 设备子网掩码
#     status: up      # 设备状态，up、down、maintenance
#     ospf: { area: 0 }       # OSPF区域，0、1、2
#     interfaces:
#       - { name: g0/0, ip: 10.0.0.1, netmask: 255.255.255.252, status: up } # 接口信息，包括接口名称、IP地址、子网掩码、状态
#       - { name: g0/1, ip: 10.0.0.5, netmask: 255.255.255.252, status: up }
#       - { name: g0/2, ip: 10.0.0.9, netmask: 255.255.255.252, status: up }


# links:
#   - {
#       id: l1,       # 链路ID，唯一标识
#       src_device: core-1,       # 源设备ID
#       src_interface: g0/0,      # 源接口名称
#       dst_device: core-2,       # 目的设备ID
#       dst_interface: g0/0,      # 目的接口名称
#       status: up,       # 链路状态，up、down、maintenance
#     } # 链路信息，包括链路ID、源设备ID、源接口名称、目的设备ID、目的接口名称、链路状态


devices:
  - id: core-1
    name: 核心路由器1
    role: core
    device_type: router
    ip: 202.16.1.1
    netmask: 255.255.255.255
    status: up
    ospf: { area: 0 }
    interfaces:
      - { name: g0/0, ip: 10.0.0.1, netmask: 255.255.255.252, status: up }
      - { name: g0/1, ip: 10.0.0.5, netmask: 255.255.255.252, status: up }
      - { name: g0/2, ip: 10.0.0.9, netmask: 255.255.255.252, status: up }

  - id: core-2
    name: 核心路由器2
    role: core
    device_type: router
    ip: 202.16.1.2
    netmask: 255.255.255.255
    status: up
    ospf: { area: 0 }
    interfaces:
      - { name: g0/0, ip: 10.0.0.2, netmask: 255.255.255.252, status: up }
      - { name: g0/1, ip: 10.0.0.13, netmask: 255.255.255.252, status: up }
      - { name: g0/2, ip: 10.0.0.17, netmask: 255.255.255.252, status: up }

  - id: agg-1
    name: 汇聚路由器1
    role: aggregation
    device_type: router
    ip: 202.16.1.3
    netmask: 255.255.255.255
    status: up
    ospf: { area: 0 }
    interfaces:
      - { name: g1/0, ip: 10.0.0.6, netmask: 255.255.255.252, status: up }
      - { name: g1/1, ip: 10.0.0.14, netmask: 255.255.255.252, status: up }
      - { name: g1/2, ip: 10.0.1.1, netmask: 255.255.255.252, status: up }

  - id: agg-2
    name: 汇聚路由器2
    role: aggregation
    device_type: router
    ip: 202.16.1.4
    netmask: 255.255.255.255
    status: up
    ospf: { area: 0 }
    interfaces:
      - { name: g1/0, ip: 10.0.0.10, netmask: 255.255.255.252, status: up }
      - { name: g1/1, ip: 10.0.0.18, netmask: 255.255.255.252, status: up }
      - { name: g1/2, ip: 10.0.2.1, netmask: 255.255.255.252, status: up }

  - id: access-1
    name: 接入路由器1
    role: access
    device_type: router
    ip: 202.16.1.5
    netmask: 255.255.255.255
    status: up
    ospf: { area: 1 }
    interfaces:
      - { name: g1/0, ip: 10.0.1.2, netmask: 255.255.255.252, status: up }
      - { name: g1/1, ip: 10.0.3.1, netmask: 255.255.255.252, status: up }


  - id: access-2
    name: 接入路由器2
    role: access
    device_type: router
    ip: 202.16.1.6
    netmask: 255.255.255.255
    status: up
    ospf: { area: 2 }
    interfaces:
      - { name: g1/0, ip: 10.0.2.2, netmask: 255.255.255.252, status: up }
      - { name: g1/1, ip: 10.0.4.1, netmask: 255.255.255.252, status: up }

  
  - id: edge-1
    name: 交换机1
    role: edge
    device_type: switch
    ip: 202.16.1.7
    netmask: 255.255.255.255
    status: up
    interfaces:
      - { name: g0/0, ip: 10.0.3.2, netmask: 255.255.255.252, status: up }
      - { name: g0/1, ip: 10.0.0.7, netmask: 255.255.255.252, status: up }
      - { name: g0/2, ip: 10.0.0.11, netmask: 255.255.255.252, status: up }
      - { name: g0/3, ip: 192.168.1.1, netmask: 255.255.255.0, status: up }

  - id: edge-2
    name: 交换机2
    role: edge
    device_type: switch
    ip: 202.16.1.8
    netmask: 255.255.255.255
    status: up
    interfaces:
      - { name: g0/0, ip: 10.0.4.2, netmask: 255.255.255.252, status: up }
      - { name: g0/1, ip: 10.0.0.8, netmask: 255.255.255.252, status: up }
      - { name: g0/2, ip: 10.0.0.12, netmask: 255.255.255.252, status: up }
      - { name: g0/3, ip: 10.0.0.16, netmask: 255.255.255.252, status: up }

  - id: pc-1
    name: PC1
    role: terminal
    device_type: pc
    status: up
    interfaces:
      - {
          name: eth0,
          ip: 192.168.1.2,
          netmask: 255.255.255.0,
          gateway: 192.168.1.1,
          status: up,
        }

  - id: pc-2
    name: PC2
    role: terminal
    device_type: pc
    status: up
    interfaces:
      - {
          name: eth0,
          ip: 192.168.1.3,
          netmask: 255.255.255.0,
          gateway: 192.168.1.1,
          status: up,
        }

  - id: pc-3
    name: PC3
    role: terminal
    device_type: pc
    status: up
    interfaces:
      - {
          name: eth0,
          ip: 192.168.2.2,
          netmask: 255.255.255.0,
          gateway: 192.168.2.1,
          status: up,
        }

  - id: pc-4
    name: PC4
    role: terminal
    device_type: pc
    status: up
    interfaces:
      - {
          name: eth0,
          ip: 192.168.2.3,
          netmask: 255.255.255.0,
          gateway: 192.168.2.1,
          status: up,
        }
  
  - id: pc-5
    name: PC5
    role: terminal
    device_type: pc
    status: up
    interfaces:
      - {
          name: eth0,
          ip: 192.168.3.2,
          netmask: 255.255.255.0,
          gateway: 192.168.3.1,
          status: up,
        }
  - id: pc-6
    name: PC6
    role: terminal
    device_type: pc
    status: up
    interfaces:
      - {
          name: eth0,
          ip: 192.168.3.3,
          netmask: 255.255.255.0,
          gateway: 192.168.3.1,
          status: up,
        }

links:
  - {
      id: l1,
      src_device: core-1,
      src_interface: g0/0,
      dst_device: core-2,
      dst_interface: g0/0,
      status: up,
    }
  - {
      id: l2,
      src_device: core-1,
      src_interface: g0/1,
      dst_device: agg-1,
      dst_interface: g1/0,
      status: up,
    }
  - {
      id: l3,
      src_device: core-1,
      src_interface: g0/2,
      dst_device: agg-2,
      dst_interface: g1/0,
      status: up,
    }
  - {
      id: l4,
      src_device: core-2,
      src_interface: g0/1,
      dst_device: agg-1,
      dst_interface: g1/1,
      status: up,
    }
  - {
      id: l5,
      src_device: core-2,
      src_interface: g0/2,
      dst_device: agg-2,
      dst_interface: g1/1,
      status: up,
    }
  - {
      id: l6,
      src_device: agg-1,
      src_interface: g1/2,
      dst_device: access-1,
      dst_interface: g1/0,
      status: up,
    }
  - {
      id: l7,
      src_device: agg-2,
      src_interface: g1/2,
      dst_device: access-2,
      dst_interface: g1/0,
      status: up,
    }
  - {
      id: l8,
      src_device: access-1,
      src_interface: g1/1,
      dst_device: edge-1,
      dst_interface: g0/0,
      status: up,
    }
  - {
      id: l9,
      src_device: access-2,
      src_interface: g1/1,
      dst_device: edge-2,
      dst_interface: g0/0,
      status: up,
    }
  - {
      id: l10,
      src_device: edge-1,
      src_interface: g0/1,
      dst_device: pc-1,
      dst_interface: eth0,
      status: up,
    }
  - {
      id: l11,
      src_device: edge-1,
      src_interface: g0/2,
      dst_device: pc-2,
      dst_interface: eth0,
      status: up,
    }
  - {
      id: l12,
      src_device: edge-1,
      src_interface: g0/3,
      dst_device: pc-3,
      dst_interface: eth0,
      status: up,
    }
  - {
      id: l13,
      src_device: edge-2,
      src_interface: g0/1,
      dst_device: pc-4,
      dst_interface: eth0,
      status: up,
    }
  - {
      id: l14,
      src_device: edge-2,
      src_interface: g0/2,
      dst_device: pc-5,
      dst_interface: eth0,
      status: up,
    }
  - {
      id: l15,
      src_device: edge-2,
      src_interface: g0/3,
      dst_device: pc-6,
      dst_interface: eth0,
      status: up,
    }
