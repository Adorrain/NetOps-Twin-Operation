# =========================
# 城域网拓扑（修正版）
# =========================
topology:
  name: OSPF操作实验
  type: 三层网络结构

# =========================
# 设备定义
# =========================
devices:
  # =========================
  # 核心层
  # =========================
  - id: core-1
    name: 路由器1
    role: core
    device_type: router
    ip: 202.16.1.1
    netmask: 255.255.255.255
    status: up
    ospf:
      area: 0
    interfaces:
      - name: g0/0
        ip: 10.0.0.1
        netmask: 255.255.255.252
        status: up
      - name: g0/1
        ip: 10.0.0.5
        netmask: 255.255.255.252
        status: up
      - name: g0/2
        ip: 10.0.0.9
        netmask: 255.255.255.252
        status: up

  - id: core-2
    name: 路由器2
    role: core
    device_type: router
    ip: 202.16.1.2
    netmask: 255.255.255.255
    status: up
    ospf:
      area: 0
    interfaces:
      - name: g0/0
        ip: 10.0.0.2
        netmask: 255.255.255.252
        status: up
      - name: g0/1
        ip: 10.0.0.13
        netmask: 255.255.255.252
        status: up
      - name: g0/2
        ip: 10.0.0.17
        netmask: 255.255.255.252
        status: up

  # =========================
  # 汇聚层（ABR）
  # =========================
  - id: agg-1
    name: 汇聚路由器1
    role: aggregation
    device_type: router
    ip: 202.16.1.3
    netmask: 255.255.255.255
    status: up
    ospf:
      area: 0
    interfaces:
      - name: g1/0
        ip: 10.0.0.6
        netmask: 255.255.255.252
        status: up
      - name: g1/1
        ip: 10.0.0.14
        netmask: 255.255.255.252
        status: up
      - name: g1/2
        ip: 10.0.1.1
        netmask: 255.255.255.252
        status: up

  - id: agg-2
    name: 汇聚路由器2
    role: aggregation
    device_type: router
    ip: 202.16.1.4
    netmask: 255.255.255.255
    status: up
    ospf:
      area: 0
    interfaces:
      - name: g1/0
        ip: 10.0.0.10
        netmask: 255.255.255.252
        status: up
      - name: g1/1
        ip: 10.0.0.18
        netmask: 255.255.255.252
        status: up
      - name: g1/2
        ip: 10.0.2.1
        netmask: 255.255.255.252
        status: up

  # =========================
  # 接入层（三层）
  # =========================
  - id: access-1
    name: 接入设备1
    role: access
    device_type: router
    ip: 202.16.1.5
    netmask: 255.255.255.255
    status: up
    ospf:
      area: 1
    interfaces:
      - name: g1/0
        ip: 10.0.1.2
        netmask: 255.255.255.252
        status: up
      - name: g1/1
        ip: 192.168.1.1
        netmask: 255.255.255.0
        status: up

  - id: access-2
    name: 接入设备2
    role: access
    device_type: router
    ip: 202.16.1.6
    netmask: 255.255.255.255
    status: up
    ospf:
      area: 2
    interfaces:
      - name: g1/0
        ip: 10.0.2.2
        netmask: 255.255.255.252
        status: up
      - name: g1/1
        ip: 192.168.2.1
        netmask: 255.255.255.0
        status: up

  # =========================
  # 终端
  # =========================
  - id: pc-1
    name: PC1
    role: terminal
    device_type: pc
    status: up
    interfaces:
      - name: eth0
        ip: 192.168.1.2
        netmask: 255.255.255.0
        gateway: 192.168.1.1
        status: up

  - id: pc-2
    name: PC2
    role: terminal
    device_type: pc
    status: up
    interfaces:
      - name: eth0
        ip: 192.168.1.3
        netmask: 255.255.255.0
        gateway: 192.168.1.1
        status: up

  - id: pc-3
    name: PC3
    role: terminal
    device_type: pc
    status: up
    interfaces:
      - name: eth0
        ip: 192.168.2.2
        netmask: 255.255.255.0
        gateway: 192.168.2.1
        status: up

  - id: pc-4
    name: PC4
    role: terminal
    device_type: pc
    status: up
    interfaces:
      - name: eth0
        ip: 192.168.2.3
        netmask: 255.255.255.0
        gateway: 192.168.2.1
        status: up

# =========================
# 链路
# =========================
links:
  - id: l1
    src_device: core-1
    src_interface: g0/0
    dst_device: core-2
    dst_interface: g0/0

  - id: l2
    src_device: core-1
    src_interface: g0/1
    dst_device: agg-1
    dst_interface: g1/0

  - id: l3
    src_device: core-1
    src_interface: g0/2
    dst_device: agg-2
    dst_interface: g1/0

  - id: l4
    src_device: core-2
    src_interface: g0/1
    dst_device: agg-1
    dst_interface: g1/1

  - id: l5
    src_device: core-2
    src_interface: g0/2
    dst_device: agg-2
    dst_interface: g1/1

  - id: l6
    src_device: agg-1
    src_interface: g1/2
    dst_device: access-1
    dst_interface: g1/0

  - id: l7
    src_device: agg-2
    src_interface: g1/2
    dst_device: access-2
    dst_interface: g1/0

  - id: l8
    src_device: access-1
    src_interface: g1/1
    dst_device: pc-1
    dst_interface: eth0

  - id: l9
    src_device: access-1
    src_interface: g1/1
    dst_device: pc-2
    dst_interface: eth0

  - id: l10
    src_device: access-2
    src_interface: g1/1
    dst_device: pc-3
    dst_interface: eth0

  - id: l11
    src_device: access-2
    src_interface: g1/1
    dst_device: pc-4
    dst_interface: eth0
