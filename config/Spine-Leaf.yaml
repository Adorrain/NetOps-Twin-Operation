# =========================
# 链路定义（Clos全互联）
# =========================
links:
  # Spine ↔ Leaf
  - {
      id: l1,
      src_device: spine-1,
      src_interface: g0/0,
      dst_device: leaf-1,
      dst_interface: g0/0,
      bandwidth: 10G,
      status: up,
    }
  - {
      id: l2,
      src_device: spine-2,
      src_interface: g0/0,
      dst_device: leaf-1,
      dst_interface: g0/1,
      bandwidth: 10G,
      status: up,
    }

  - {
      id: l3,
      src_device: spine-1,
      src_interface: g0/1,
      dst_device: leaf-2,
      dst_interface: g0/0,
      bandwidth: 10G,
      status: up,
    }
  - {
      id: l4,
      src_device: spine-2,
      src_interface: g0/1,
      dst_device: leaf-2,
      dst_interface: g0/1,
      bandwidth: 10G,
      status: up,
    }

  - {
      id: l5,
      src_device: spine-1,
      src_interface: g0/2,
      dst_device: leaf-3,
      dst_interface: g0/0,
      bandwidth: 10G,
      status: up,
    }
  - {
      id: l6,
      src_device: spine-2,
      src_interface: g0/2,
      dst_device: leaf-3,
      dst_interface: g0/1,
      bandwidth: 10G,
