# 数据中心三层映射

ospfReferenceBandwidth: 10G

devices:
  - id: core-1
    name: 核心交换机-1
    role: core
    deviceType: router
    ip: 10.0.1.10
    netmask: 255.255.255.0
    status: up
    ospf: { routerId: 10.10.10.10, area: 0 }
    interfaces:
      - { name: g0/0, ip: 10.0.1.10, netmask: 255.255.255.252, status: up }
      - { name: g0/1, ip: 10.0.2.10, netmask: 255.255.255.252, status: up }

  - id: spine-1
    name: Spine交换机-1
    role: aggregation
    deviceType: switch
    ip: 10.0.0.1
    netmask: 255.255.255.0
    status: up
    ospf: { routerId: 1.1.1.1, area: 0 }
    interfaces:
      - { name: g0/0, ip: 10.0.1.1, netmask: 255.255.255.252, status: up }
      - {
          name: g0/1,
          ip: 10.0.1.5,
          netmask: 255.255.255.252,
          status: up,
          vlans: [10],
        }
      - {
          name: g0/2,
          ip: 10.0.1.17,
          netmask: 255.255.255.252,
          status: up,
          vlans: [20],
        }
      - {
          name: g0/3,
          ip: 10.0.1.13,
          netmask: 255.255.255.252,
          status: up,
          vlans: [30],
        }
      - {
          name: g0/4,
          ip: 10.0.1.5,
          netmask: 255.255.255.252,
          status: up,
          vlans: [40],
        }

  - id: spine-2
    role: aggregation
    name: Spine交换机-2
    deviceType: switch
    ip: 10.0.0.2
    netmask: 255.255.255.0
    status: up
