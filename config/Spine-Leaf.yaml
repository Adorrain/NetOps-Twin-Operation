# =========================
# 数据中心三层映射（兼容你系统）
# =========================
topology:
  name: 数据中心Spine-Leaf拓扑（兼容三层渲染）
  type: 三层映射结构

devices:
  # =========================
  # Core层（Spine）
  # =========================
  - id: spine-1
    name: Spine交换机-1
    role: core # 👈 关键改动
    device_type: switch
    ip: 10.0.0.1
    netmask: 255.255.255.0
    status: up
    ospf: { router_id: 1.1.1.1, area: 0 }
    interfaces:
      - { name: g0/0, ip: 10.0.1.1, netmask: 255.255.255.252, status: up }
      - { name: g0/1, ip: 10.0.1.5, netmask: 255.255.255.252, status: up }
      - { name: g0/2, ip: 10.0.1.9, netmask: 255.255.255.252, status: up }
      - { name: g0/3, ip: 10.0.1.13, netmask: 255.255.255.252, status: up }

  - id: spine-2
    name: Spine交换机-2
    role: core
    device_type: switch
    ip: 10.0.0.2
    netmask: 255.255.255.0
    status: up
    ospf: { router_id: 2.2.2.2, area: 0 }
    interfaces:
      - { name: g0/0, ip: 10.0.2.1, netmask: 255.255.255.252, status: up }
      - { name: g0/1, ip: 10.0.2.5, netmask: 255.255.255.252, status: up }
      - { name: g0/2, ip: 10.0.2.9, netmask: 255.255.255.252, status: up }
      - { name: g0/3, ip: 10.0.2.13, netmask: 255.255.255.252, status: up }

  # =========================
  # Aggregation层（Leaf）
  # =========================
  - id: leaf-1
    name: Leaf交换机-1
    role: aggregation # 👈 关键改动
    device_type: switch
    ip: 10.0.0.11
    netmask: 255.255.255.0
    status: up
    ospf: { router_id: 11.11.11.11, area: 0 }
    vlans: [{ vlan_id: 10, name: 业务网-1 }]
    interfaces:
      - { name: g0/0, ip: 10.0.1.2, netmask: 255.255.255.252, status: up }
      - { name: g0/1, ip: 10.0.2.2, netmask: 255.255.255.252, status: up }
      - { name: g1/0, mode: access, vlan: 10, status: up }
      - { name: g1/1, mode: access, vlan: 10, status: up }
      - { name: g1/2, mode: access, vlan: 10, status: up }

  - id: leaf-2
    name: Leaf交换机-2
    role: aggregation
    device_type: switch
    ip: 10.0.0.12
    netmask: 255.255.255.0
    status: up
    ospf: { router_id: 12.12.12.12, area: 0 }
    vlans: [{ vlan_id: 20, name: 业务网-2 }]
    interfaces:
      - { name: g0/0, ip: 10.0.1.6, netmask: 255.255.255.252, status: up }
      - { name: g0/1, ip: 10.0.2.6, netmask: 255.255.255.252, status: up }
      - { name: g1/0, mode: access, vlan: 20, status: up }
      - { name: g1/1, mode: access, vlan: 20, status: up }
      - { name: g1/2, mode: access, vlan: 20, status: up }

  - id: leaf-3
    name: Leaf交换机-3
    role: aggregation
    device_type: switch
    ip: 10.0.0.13
    netmask: 255.255.255.0
    status: up
    ospf: { router_id: 13.13.13.13, area: 0 }
    vlans: [{ vlan_id: 30, name: 业务网-3 }]
    interfaces:
      - { name: g0/0, ip: 10.0.1.10, netmask: 255.255.255.252, status: up }
      - { name: g0/1, ip: 10.0.2.10, netmask: 255.255.255.252, status: up }
      - { name: g1/0, mode: access, vlan: 30, status: up }
      - { name: g1/1, mode: access, vlan: 30, status: up }
      - { name: g1/2, mode: access, vlan: 30, status: up }

  - id: leaf-4
    name: Leaf交换机-4
    role: aggregation
    device_type: switch
    ip: 10.0.0.14
    netmask: 255.255.255.0
    status: up
    ospf: { router_id: 14.14.14.14, area: 0 }
    vlans: [{ vlan_id: 40, name: 业务网-4 }]
    interfaces:
      - { name: g0/0, ip: 10.0.1.14, netmask: 255.255.255.252, status: up }
      - { name: g0/1, ip: 10.0.2.14, netmask: 255.255.255.252, status: up }
      - { name: g1/0, mode: access, vlan: 40, status: up }
      - { name: g1/1, mode: access, vlan: 40, status: up }
      - { name: g1/2, mode: access, vlan: 40, status: up }

  # =========================
  # Terminal层（服务器）
  # =========================
  - id: server-1
    name: 服务器-1
    role: server
    device_type: server
    ip: 192.168.10.10
    netmask: 255.255.255.0
    gateway: 192.168.10.1
    vlan: 10
    status: up
    interfaces:
      - {
          name: eth0,
          ip: 192.168.10.10,
          netmask: 255.255.255.0,
          vlan: 10,
          status: up,
        }

  # 👉 server-2 ~ server-12 完全一样（你直接用我之前那份复制即可）
  - {
      id: server-2,
      name: 服务器-2,
      role: server,
      device_type: server,
      ip: 192.168.10.11,
      netmask: 255.255.255.0,
      gateway: 192.168.10.1,
      vlan: 10,
      status: up,
      interfaces:
        [
          {
            name: eth0,
            ip: 192.168.10.11,
            netmask: 255.255.255.0,
            vlan: 10,
            status: up,
