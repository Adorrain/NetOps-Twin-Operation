      - { name: g0/0, ip: 10.0.2.1, netmask: 255.255.255.252, status: up }
      - { name: g0/1, ip: 10.0.2.5, netmask: 255.255.255.252, status: up }
      - { name: g0/2, ip: 10.0.2.17, netmask: 255.255.255.252, status: up }
      - { name: g0/3, ip: 10.0.2.13, netmask: 255.255.255.252, status: up }
      - { name: g0/4, ip: 10.0.2.5, netmask: 255.255.255.252, status: up }

  - id: leaf-1
    name: Leaf交换机-1
    role: access
    deviceType: switch
    ip: 10.0.0.11
    netmask: 255.255.255.0
    status: up
    ospf: { routerId: 11.11.11.11, area: 1 }
    interfaces:
      - { name: g0/0, ip: 10.0.1.2, netmask: 255.255.255.252, status: up }
      - { name: g0/1, ip: 10.0.2.2, netmask: 255.255.255.252, status: up }
      - { name: g1/0, mode: access, vlans: [10], status: up }
      - { name: g1/1, mode: access, vlans: [10], status: up }
      - { name: g1/2, mode: access, vlans: [10], status: up }

