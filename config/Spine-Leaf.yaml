      - { name: g0/1, ip: 10.0.2.14, netmask: 255.255.255.252, status: up }
      - { name: g1/0, mode: access, vlans: [40], status: up }
      - { name: g1/1, mode: access, vlans: [40], status: up }
      - { name: g1/2, mode: access, vlans: [40], status: up }

