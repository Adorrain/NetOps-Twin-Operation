# =========================
# 工业园区三层网络拓扑
# =========================
topology:
  name: 工业园区网络拓扑
  type: 三层架构

# =========================
# 设备定义
# =========================
devices:
  # =========================
  # 核心层
  # =========================
  - id: ind-core-1
    name: 园区核心路由器
    role: core
    device_type: router
    mgmt_ip: 192.168.0.1
    status: up
    ospf:
      router_id: 3.3.3.3
      area: 0
    interfaces:
      - name: g0/0
        ip: 10.0.1.1/30
        status: up
      - name: g0/1
        ip: 10.0.1.5/30
        status: up

  # =========================
  # 汇聚层
  # =========================
  - id: ind-agg-1
    name: 厂房汇聚交换机-1（生产区）
    role: aggregation
    device_type: switch
    mgmt_ip: 192.168.0.11
    status: up
    interfaces:
      - name: g1/0 # 上联核心
        ip: 10.0.1.2/30
        status: up
      - name: g1/1 # 下联接入
        status: up

  - id: ind-agg-2
    name: 厂房汇聚交换机-2（办公区）
    role: aggregation
    device_type: switch
    mgmt_ip: 192.168.0.12
    status: up
    interfaces:
      - name: g1/0 # 上联核心
        ip: 10.0.1.6/30
        status: up
      - name: g1/1 # 下联接入
        status: up

  # =========================
  # 接入层
  # =========================
  - id: ind-access-1
    name: 生产车间接入交换机
    role: access
    device_type: switch
    mgmt_ip: 192.168.0.21
    status: up
    interfaces:
      - name: g1/0 # 上联汇聚
        status: up
      - name: g1/1 # 接PLC
        status: up
      - name: g1/2 # 接服务器
        status: up

  - id: ind-access-2
    name: 办公区接入交换机
    role: access
    device_type: switch
    mgmt_ip: 192.168.0.22
    status: up
    interfaces:
      - name: g1/0 # 上联汇聚
        status: up
      - name: g1/1 # 接PC-1
        status: up
      - name: g1/2 # 接PC-2
        status: up

  # =========================
  # 终端设备
  # =========================
  - id: ind-pc-1
    name: 办公PC-1
    role: terminal
    device_type: pc # 修改：host → pc
    ip: 192.168.10.10/24
    gateway: 192.168.10.1
    vlan: 10
    status: up

  - id: ind-pc-2
    name: 办公PC-2
    role: terminal
    device_type: pc # 修改：host → pc
    ip: 192.168.10.11/24
    gateway: 192.168.10.1
    vlan: 10
    status: up

  - id: ind-plc-1
    name: 工控终端-PLC
    role: terminal
    device_type: pc # 暂用 pc，后续可扩展为 plc 或 industrial_controller
    ip: 192.168.20.10/24
    gateway: 192.168.20.1
    vlan: 20
    status: up

  - id: ind-server-1
    name: 生产管理服务器
    role: terminal
    device_type: server
    ip: 192.168.20.20/24
    gateway: 192.168.20.1
    vlan: 20
    status: up

# =========================
# 链路定义
# =========================
links:
  - id: ind-l1
    src_device: ind-core-1
    src_interface: g0/0
    dst_device: ind-agg-1
    dst_interface: g1/0
    status: up
    bandwidth: 10G

  - id: ind-l2
    src_device: ind-core-1
    src_interface: g0/1
    dst_device: ind-agg-2
    dst_interface: g1/0
    status: up
    bandwidth: 10G

  - id: ind-l3
    src_device: ind-agg-1
    src_interface: g1/1
    dst_device: ind-access-1
    dst_interface: g1/0
    status: up
    bandwidth: 10G

  - id: ind-l4
    src_device: ind-agg-2
    src_interface: g1/1
    dst_device: ind-access-2
    dst_interface: g1/0
    status: up
    bandwidth: 10G

  - id: ind-l5
    src_device: ind-access-2
    src_interface: g1/1
    dst_device: ind-pc-1
    dst_interface: eth0
    status: up

  - id: ind-l6
    src_device: ind-access-2
    src_interface: g1/2
    dst_device: ind-pc-2
    dst_interface: eth0
    status: up

  - id: ind-l7
    src_device: ind-access-1
    src_interface: g1/1
    dst_device: ind-plc-1
    dst_interface: eth0
    status: up

  - id: ind-l8
    src_device: ind-access-1
    src_interface: g1/2
    dst_device: ind-server-1
    dst_interface: eth0
    status: up
