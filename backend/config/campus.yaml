# =========================
# 校园网三层拓扑定义
# =========================
topology:
  name: 校园网络拓扑
  type: 三层网络结构

# =========================
# 设备定义
# =========================
devices:
  # =========================
  # 核心层设备
  # =========================
  - id: core-1
    name: 核心路由器
    role: core
    device_type: router
    mgmt_ip: 10.0.0.1
    status: up
    ospf:
      router_id: 1.1.1.1
      area: 0
    interfaces:
      - name: g0/0
        ip: 10.0.1.1/30
        status: up
      - name: g0/1
        ip: 10.0.1.5/30
        status: up

  # =========================
  # 汇聚层设备
  # =========================
  - id: agg-1
    name: 汇聚交换机
    role: aggregation
    device_type: switch
    mgmt_ip: 10.0.0.11
    status: up
    ospf:
      router_id: 2.2.2.2
      area: 0
    vlans:
      - vlan_id: 10
        name: 教学网
      - vlan_id: 20
        name: 办公网
    interfaces:
      - name: g1/0
        ip: 10.0.1.2/30
        status: up
      - name: g1/1
        status: up
      - name: g1/2
        status: up

  # =========================
  # 接入层设备
  # =========================
  - id: access-1
    name: 接入交换机-教学楼
    role: access
    device_type: switch
    mgmt_ip: 10.0.0.21
    status: up
    vlans:
      - vlan_id: 10
        name: 教学网
    interfaces:
      - name: g1/0
        status: up
      - name: g1/1
        status: up
      - name: g1/2
        status: up
      - name: g1/3 # 补上，用于连接 pc-3
        status: up

  - id: access-2
    name: 接入交换机-办公楼
    role: access
    device_type: switch
    mgmt_ip: 10.0.0.22
    status: up
    vlans:
      - vlan_id: 20
        name: 办公网
    interfaces:
      - name: g1/0
        status: up
      - name: g1/1
        status: up
      - name: g1/2
        status: up

  # =========================
  # 终端设备（教学网 PC）
  # =========================
  - id: pc-1
    name: 教学PC-1
    role: terminal
    device_type: pc # 修改：host → pc
    ip: 192.168.10.10/24
    gateway: 192.168.10.1
    vlan: 10
    status: up

  - id: pc-2
    name: 教学PC-2
    role: terminal
    device_type: pc # 修改：host → pc
    ip: 192.168.10.11/24
    gateway: 192.168.10.1
    vlan: 10
    status: up

  - id: pc-3
    name: 教学PC-3
    role: terminal
    device_type: pc # 修改：host → pc
    ip: 192.168.10.12/24
    gateway: 192.168.10.1
    vlan: 10
    status: up

  # =========================
  # 服务器（办公网）
  # =========================
  - id: server-1
    name: 办公服务器
    role: server
    device_type: server # 保持不变，已符合标准
    ip: 192.168.20.10/24
    gateway: 192.168.20.1
    vlan: 20
    status: up

# =========================
# 链路定义（拓扑关系）
# =========================
links:
  - id: l1
    src_device: core-1
    src_interface: g0/0
    dst_device: agg-1
    dst_interface: g1/0
    status: up
    bandwidth: 10G

  - id: l2
    src_device: agg-1
    src_interface: g1/1
    dst_device: access-1
    dst_interface: g1/0
    status: up
    bandwidth: 1G

  - id: l3
    src_device: agg-1
    src_interface: g1/2
    dst_device: access-2
    dst_interface: g1/0
    status: up
    bandwidth: 1G

  - id: l4
    src_device: access-1
    src_interface: g1/1
    dst_device: pc-1
    dst_interface: eth0
    status: up

  - id: l5
    src_device: access-1
    src_interface: g1/2
    dst_device: pc-2
    dst_interface: eth0
    status: up

  - id: l6
    src_device: access-1
    src_interface: g1/3
    dst_device: pc-3
    dst_interface: eth0
    status: up

  - id: l7
    src_device: access-2
    src_interface: g1/1
    dst_device: server-1
    dst_interface: eth0
    status: up

# =========================
# DDoS 攻击仿真配置
# =========================
ddos_simulation:
  attack_sources:
    - pc-1
    - pc-2
    - pc-3
  target:
    device: server-1
    interface: eth0
  traffic_type: syn_flood
  rate: high
