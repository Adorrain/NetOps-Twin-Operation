services:
  backend:
    build:
      context: ./backend
    environment:
      FRONTEND_URL: http://localhost:3001
      FRONTEND_URL_SPARE: http://127.0.0.1:3001
      NETOPS_DB_PATH: /app/data/netops.db
    volumes:
      - netops_data:/app/data
      - netops_config:/app/config
    ports:
      - "81:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "3001:80"

volumes:
  netops_data:
  netops_config:
